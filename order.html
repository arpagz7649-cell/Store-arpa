<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Master Store - Koneksi Server Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // 1. Fungsi Utama: Menyambungkan HTML ke PHP & JSON
        async function ambilDataGudang() {
            try {
                // Menyambung ke file PHP yang Master buat tadi
                const respon = await fetch('ambil_data.php'); 
                const gudang = await respon.json();
                
                // Ambil daftar stok dari JSON lewat PHP
                const stok = gudang.stok_game;
                const untungMaster = 1000;

                // 2. Suntikkan harga ke tombol-tombol HTML secara otomatis
                stok.forEach(item => {
                    const elemenHarga = document.getElementById('harga-' + item.kode);
                    if (elemenHarga) {
                        const hargaFinal = item.harga_modal + untungMaster;
                        elemenHarga.innerText = "Rp " + hargaFinal.toLocaleString('id-ID');
                    }
                });

                console.log("Koneksi PHP & JSON Berhasil Disambungkan!");
            } catch (err) {
                console.error("Gagal nyambung ke PHP/JSON Master!", err);
            }
        }

        // Jalankan penyambungan otomatis saat halaman Master dibuka
        window.onload = ambilDataGudang;
    </script>
</head>

<body class="bg-[#0b0e14] text-white p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black text-blue-500 mb-8 tracking-tighter italic">MASTER STORE</h1>

        <div class="mb-6">
            <input type="text" id="idGame" placeholder="MASUKKAN ID MASTER..." 
                   class="w-full p-4 rounded-xl bg-gray-900 border border-gray-800 outline-none focus:border-blue-500 font-bold">
        </div>

        <div class="grid grid-cols-2 gap-4">
            
            <div class="bg-gray-900 p-5 rounded-3xl border border-gray-800 hover:border-blue-500 transition">
                <p class="text-[10px] text-gray-500 font-bold">ROBLOX</p>
                <p class="font-black text-lg">80 Robux</p>
                <p id="harga-roblox80" class="text-blue-400 font-bold text-sm">Menyambungkan...</p>
            </div>

            <div class="bg-gray-900 p-5 rounded-3xl border border-gray-800 hover:border-blue-500 transition">
                <p class="text-[10px] text-gray-500 font-bold">MLBB</p>
                <p class="font-black text-lg">86 Diamond</p>
                <p id="harga-ml86" class="text-blue-400 font-bold text-sm">Menyambungkan...</p>
            </div>

        </div>
    </div>
</body>
</html>
