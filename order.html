<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Store - Pilih Nominal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0d0d12; color: white; }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .input-field:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            outline: none;
        }

        .nominal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.3s;
        }
        .nominal-card:hover { border-color: #3b82f6; transform: translateY(-3px); }
        .selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="pb-20">

    <nav class="p-5 flex items-center border-b border-gray-900 bg-[#0d0d12] sticky top-0 z-50">
        <a href="index.html" class="mr-4 text-blue-500 font-bold">← Kembali</a>
        <h1 class="text-lg font-bold">Top Up Roblox</h1>
    </nav>

    <div class="container mx-auto px-5 mt-8 max-w-2xl">
        
        <section class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <span class="bg-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                <h2 class="text-xl font-bold">Lengkapi Data</h2>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="userId" placeholder="Masukkan User ID / Nickname" class="input-field p-4 rounded-2xl w-full">
            </div>
            <p class="text-[10px] text-gray-500 mt-2">*Pastikan ID sudah benar agar Robux tidak nyasar.</p>
        </section>

        <section class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <span class="bg-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                <h2 class="text-xl font-bold">Pilih Nominal</h2>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="nominal-card p-4 rounded-2xl relative overflow-hidden" onclick="selectNominal(this, '80 Robux', '15.000')">
                    <p class="text-xs text-gray-400">Roblox</p>
                    <p class="font-bold text-lg">80 <span class="text-xs">R$</span></p>
                    <p class="text-blue-400 text-sm font-semibold">Rp 15.000</p>
                </div>
                <div class="nominal-card p-4 rounded-2xl relative overflow-hidden" onclick="selectNominal(this, '400 Robux', '75.000')">
                    <p class="text-xs text-gray-400">Roblox</p>
                    <p class="font-bold text-lg">400 <span class="text-xs">R$</span></p>
                    <p class="text-blue-400 text-sm font-semibold">Rp 75.000</p>
                </div>
                </div>
        </section>

        <section class="mb-24">
            <div class="flex items-center gap-2 mb-4">
                <span class="bg-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">3</span>
                <h2 class="text-xl font-bold">Pembayaran</h2>
            </div>
            <div class="input-field p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg" class="h-5 invert opacity-70">
                    <span class="font-medium">QRIS / E-Wallet</span>
                </div>
                <span class="text-[10px] bg-green-600/20 text-green-400 px-2 py-1 rounded">Otomatis</span>
            </div>
        </section>

    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-[#16161d] border-t border-gray-800 flex justify-between items-center z-50">
        <div>
            <p class="text-[10px] text-gray-400">Total Pembayaran</p>
            <p id="displayPrice" class="text-lg font-bold text-blue-400">Rp 0</p>
        </div>
        <button onclick="checkout()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-2xl font-bold text-sm transition">Beli Sekarang</button>
    </div>

    <script>
        let selectedProduct = "";
        let selectedPrice = "";

        function selectNominal(el, name, price) {
            // Hapus kelas selected dari semua kartu
            document.querySelectorAll('.nominal-card').forEach(card => card.classList.remove('selected'));
            // Tambah ke yang diklik
            el.classList.add('selected');
            
            selectedProduct = name;
            selectedPrice = price;
            document.getElementById('displayPrice').innerText = "Rp " + price;
        }

        function checkout() {
            const id = document.getElementById('userId').value;
            if(!id || !selectedProduct) {
                alert("Lengkapi ID dan Pilih Nominal dulu, Master!");
                return;
            }

            const noWA = "628xxxxxxxx"; // Ganti dengan nomor Master
            const teks = `ORDER BARU MASTER STORE!\n\nGame: Roblox\nProduk: ${selectedProduct}\nID: ${id}\nTotal: Rp ${selectedPrice}\n\nMetode: QRIS\nMohon diproses ya Master!`;
            
            window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(teks)}`);
        }
    </script>
</body>
</html>
