<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Store - Form Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card-nominal {
            background: #1e293b;
            border: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }
        .card-nominal:hover { border-color: #3b82f6; }
    </style>
</head>
<body class="p-5">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center mb-8">DETAIL PESANAN</h1>

        <div class="mb-6 bg-slate-800 p-4 rounded-xl">
            <label class="block mb-2 font-semibold">ID Game / User ID</label>
            <input type="text" id="inputID" placeholder="Contoh: 12345678" 
                   class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-blue-500">
        </div>

        <div class="mb-6">
            <label class="block mb-4 font-semibold text-blue-400">Pilih Nominal (Harga +1000 Untung Master)</label>
            <div class="grid grid-cols-2 gap-4">
                
                <div class="card-nominal p-4 rounded-xl text-center" onclick="pilihProduk('roblox80')">
                    <p class="text-sm opacity-70">Roblox</p>
                    <p class="font-bold">80 Robux</p>
                    <p id="harga-roblox80" class="text-blue-400 font-mono text-sm font-bold">Memuat harga...</p>
                </div>

                <div class="card-nominal p-4 rounded-xl text-center" onclick="pilihProduk('roblox400')">
                    <p class="text-sm opacity-70">Roblox</p>
                    <p class="font-bold">400 Robux</p>
                    <p id="harga-roblox400" class="text-blue-400 font-mono text-sm font-bold">Memuat harga...</p>
                </div>

                <div class="card-nominal p-4 rounded-xl text-center" onclick="pilihProduk('ml86')">
                    <p class="text-sm opacity-70">Mobile Legends</p>
                    <p class="font-bold">86 Diamonds</p>
                    <p id="harga-ml86" class="text-blue-400 font-mono text-sm font-bold">Memuat harga...</p>
                </div>

                <div class="card-nominal p-4 rounded-xl text-center" onclick="pilihProduk('ff140')">
                    <p class="text-sm opacity-70">Free Fire</p>
                    <p class="font-bold">140 Diamonds</p>
                    <p id="harga-ff140" class="text-blue-400 font-mono text-sm font-bold">Memuat harga...</p>
                </div>

            </div>
        </div>

        <button id="btnBeli" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">
            BELI SEKARANG
        </button>
    </div>

    <p class="text-center text-xs text-slate-500 mt-10">© 2026 Master Store - Semua Harga +Rp 1.000</p>

    </body>
</html>
